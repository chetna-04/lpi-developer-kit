<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPI Developer Kit — Contributor Leaderboard</title>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f35 50%, #0a0e17 100%);
            border-bottom: 1px solid rgba(99, 179, 237, 0.1);
            padding: 3rem 2rem 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #63b3ed, #b794f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero .subtitle {
            color: #718096;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto;
        }

        .stat-card {
            background: rgba(26, 32, 53, 0.8);
            border: 1px solid rgba(99, 179, 237, 0.15);
            border-radius: 12px;
            padding: 1.2rem 2rem;
            min-width: 140px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(99, 179, 237, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 179, 237, 0.1);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #63b3ed, #b794f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label { color: #718096; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        .controls {
            display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
        }

        .search-box {
            flex: 1; min-width: 200px;
            background: #1a2035;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: #63b3ed; }
        .search-box::placeholder { color: #4a5568; }

        .filter-btn {
            background: #1a2035;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 0.7rem 1.2rem;
            color: #a0aec0;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: #63b3ed;
            color: #63b3ed;
            background: rgba(99, 179, 237, 0.08);
        }

        .table-wrapper {
            background: rgba(26, 32, 53, 0.6);
            border: 1px solid rgba(99, 179, 237, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: rgba(26, 32, 53, 0.9);
            padding: 0.9rem 1.2rem;
            text-align: left;
            color: #718096;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        td {
            padding: 0.8rem 1.2rem;
            border-top: 1px solid rgba(45, 55, 72, 0.5);
            font-size: 0.9rem;
        }

        tr { transition: background 0.15s; }
        tr:hover { background: rgba(99, 179, 237, 0.04); }
        tr.top-3 td:first-child { font-weight: 700; }

        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }

        .level-badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .level-1 { background: rgba(72, 187, 120, 0.15); color: #68d391; border: 1px solid rgba(72, 187, 120, 0.3); }
        .level-2 { background: rgba(99, 179, 237, 0.15); color: #63b3ed; border: 1px solid rgba(99, 179, 237, 0.3); }
        .level-3 { background: rgba(183, 148, 244, 0.15); color: #b794f4; border: 1px solid rgba(183, 148, 244, 0.3); }

        .score-bar {
            display: inline-block;
            height: 6px;
            border-radius: 3px;
            background: #2d3748;
            width: 80px;
            position: relative;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        .score-bar .fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #63b3ed, #b794f4);
            transition: width 0.5s ease;
        }

        .score-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #a0aec0;
        }

        .skills-tag {
            display: inline-block;
            background: rgba(45, 55, 72, 0.8);
            border-radius: 4px;
            padding: 0.15rem 0.5rem;
            font-size: 0.7rem;
            color: #a0aec0;
            margin: 0.1rem;
        }

        a { color: #63b3ed; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .mock-badge {
            display: inline-block;
            background: rgba(237, 137, 54, 0.15);
            color: #ed8936;
            border: 1px solid rgba(237, 137, 54, 0.3);
            border-radius: 4px;
            padding: 0.1rem 0.5rem;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 0.5rem;
        }

        .timeline {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 2rem;
            background: #1a2035;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d3748;
        }

        .timeline-btn {
            flex: 1;
            padding: 0.8rem 1rem;
            background: transparent;
            border: none;
            color: #718096;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            transition: all 0.2s;
            border-right: 1px solid #2d3748;
        }
        .timeline-btn:last-child { border-right: none; }
        .timeline-btn:hover { background: rgba(99, 179, 237, 0.05); color: #a0aec0; }
        .timeline-btn.active {
            background: rgba(99, 179, 237, 0.1);
            color: #63b3ed;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: #4a5568;
            font-size: 0.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #4a5568;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>

<div class="hero">

    </div>
</div>

</div>

let currentTimeline = 'day1';
let currentFilter = 'all';
let searchQuery = '';

function setTimeline(key) {
    currentTimeline = key;
    document.querySelectorAll('.timeline-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    render();
}

function filterLevel(level) {
    currentFilter = level;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    render();
}

function filterTable(query) {
    searchQuery = query.toLowerCase();
    render();
}

function render() {
    let data = MOCK_DATA[currentTimeline] || [];

    if (currentFilter !== 'all') {
        data = data.filter(d => d.level === currentFilter);
    }

    if (searchQuery) {
        data = data.filter(d =>
            d.name.toLowerCase().includes(searchQuery) ||
            d.skills.some(s => s.toLowerCase().includes(searchQuery)) ||
            (d.team && d.team.toLowerCase().includes(searchQuery)) ||
            (d.interests && d.interests.some(i => i.toLowerCase().includes(searchQuery)))
        );
    }

    // Update stats
    const all = MOCK_DATA[currentTimeline] || [];
    document.getElementById('stat-total').textContent = all.length;
    document.getElementById('stat-l1').textContent = all.filter(d => d.level >= 1).length;
    document.getElementById('stat-l2').textContent = all.filter(d => d.level >= 2).length;
    document.getElementById('stat-l3').textContent = all.filter(d => d.level >= 3).length;
    document.getElementById('stat-agents').textContent = all.reduce((sum, d) => sum + (d.agents || 0), 0);

    const tbody = document.getElementById('leaderboard-body');
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:3rem;color:#4a5568">No contributors match your filter</td></tr>';
        return;
    }

    const maxScore = Math.max(...data.map(d => d.score), 1);

    tbody.innerHTML = data.map((d, i) => {
        const rankClass = i < 3 ? `rank-${i+1}` : '';
        const topClass = i < 3 ? 'top-3' : '';
        const levelClass = `level-${d.level}`;
        const scorePct = Math.round((d.score / maxScore) * 100);
        const skillsHtml = d.skills.slice(0, 4).map(s => `<span class="skills-tag">${s}</span>`).join('');
        const teamStr = d.team || '—';
        const agentCount = d.agents ? ` (${d.agents} agents)` : '';

        return `<tr class="${topClass} animate-in" style="animation-delay:${i * 0.03}s">
            <td class="${rankClass}">${i + 1}</td>
            <td><strong>${d.name}</strong></td>
            <td><a href="https://github.com/${d.github}">${d.github}</a></td>
            <td><span class="level-badge ${levelClass}">L${d.level}</span></td>
            <td><span class="score-bar"><span class="fill" style="width:${scorePct}%"></span></span><span class="score-text">${d.score}${agentCount}</span></td>
            <td>${skillsHtml}</td>
            <td>${teamStr}</td>
        </tr>`;
    }).join('');
}

// Initial render
render();
</script>
